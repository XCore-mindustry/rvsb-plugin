welcome=[cyan]袛芯斜褉芯 锌芯卸邪谢芯胁邪褌褜!
welcome.text=小懈薪褌械褌懈褔械褋泻邪褟 褎芯褉屑邪 卸懈蟹薪懈 锌芯写 薪邪蟹胁邪薪懈械屑 褋锌芯褉褘 懈 薪械泻芯薪褌褉芯谢懈褉褍械屑邪褟 屑邪褋褋邪 斜褘褋褌褉芯 写械谢褟褖懈褏褋褟 泻谢械褌芯泻 - 薪械芯锌谢邪蟹屑邪 芯斜褗械写械薪懈谢懈褋褜 懈 锌芯褉芯写懈谢懈 蟹芯屑斜懈-胁懈褉褍褋, 泻芯褌芯褉褘泄 褍斜懈谢 胁褋械 卸懈胁芯械 薪邪 小械褉锌褍谢芯. 袙褘 - 锌芯褋谢械写薪懈泄 芯锌谢芯褌 卸懈蟹薪懈 薪邪 褝褌芯泄 锌谢邪薪械褌械, 褍薪懈褔褌芯卸褜褌械 胁褋械 胁芯谢薪褘 懈 锌芯斜械写懈褌械 袙懈褉褍褋.\
校褔械薪褘械 懈蟹 IntergalacticUnion 谐芯褌芯胁褘 锌芯褋褘谢邪褌褜 胁邪屑 薪芯胁褘褏, 斜芯谢械械 屑芯褖薪褘褏 屑邪褕懈薪 写谢褟 泻褉邪屑褋邪薪懈褟 薪械褔械褋褌懈 蟹邪 谐芯谢芯胁褘 屑械褉褌胁械褑芯胁. 袛械谢芯 胁 褌芯屑 褔褌芯 芯薪懈 褉邪蟹褉邪斜邪褌褘胁邪褞褌 胁邪泻褑懈薪褍 芯褌 褝褌芯谐芯 胁懈褉褍褋邪, 褔褌芯斜褘 胁锌褉械写褜 芯薪 薪械 斜褘谢 褍谐褉芯蟹芯泄 斜懈芯谢芯谐懈褔械褋泻芯泄 卸懈蟹薪懈.\
啸芯褉芯褕械谐芯 胁褘卸懈胁邪薪懈褟!\
效褌芯 斜褘 泻褍锌懈褌褜 褞薪懈褌邪 锌芯写芯泄写懈褌械 泻 谢邪斜芯谢邪褌芯褉懈懈 懈 薪邪卸屑懈褌械 薪邪 薪械褢\
/s - 锌芯褋褌褉芯泄泻邪 褋褌邪薪褑懈泄\
/c - 屑械薪褞 胁褘斜芯褉邪 泻谢邪褋褋邪\
/b  - 胁褘斜芯褉 斜谢芯泻邪 写谢褟 褋褌褉芯懈褌械谢褜褋褌胁邪\
/build - 褋褌褉芯懈褌械谢褜褋褌胁芯 懈谢懈 芯褌泻谢褞褔械薪懈械 褋褌褉芯懈褌械谢褜褋褌胁邪
